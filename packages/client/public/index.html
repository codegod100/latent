<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cloudflare Isolated ATProto Client</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; line-height: 1.5; padding: 0 1rem; }
    .panel { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; background: #fdfdfd; }
    button { padding: 0.6rem 1.2rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    pre { background: #111; color: #0f0; padding: 1rem; border-radius: 6px; overflow: auto; max-height: 300px; font-size: 0.85rem; }
    input { padding: 0.6rem; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
    .msg-item { border-bottom: 1px solid #eee; padding: 0.5rem 0; }
    .msg-author { font-weight: bold; color: #007bff; }
    .msg-date { color: #666; font-size: 0.8rem; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Cloudflare Isolated ATProto Client</h1>
  <p><strong>Front-end:</strong> Cloudflare Pages (Stateless)<br>
     <strong>Back-end:</strong> Cloudflare Worker + D1 (Untrusted Relay)</p>

  <div id="loading-panel" class="panel" style="text-align: center;">
    <div class="spinner"></div> Checking session...
  </div>

  <div id="login-panel" class="panel" style="display:none">
    <label style="display:block; font-weight:bold; margin-bottom:0.5rem;">Handle</label>
    <div style="display:flex; gap:0.5rem;">
      <input id="handle" value="nandi.latha.org" placeholder="handle.bsky.social">
      <button id="login-btn">Login via PDS</button>
    </div>
  </div>

  <div id="app-panel" class="panel" style="display:none">
    <h3>Hello, <span id="user-handle" style="color:#007bff"></span></h3>
    <div style="margin-top: 1rem; display:flex; flex-direction:column; gap:0.5rem;">
      <label style="font-weight:bold;">New Message (Isolated Storage)</label>
      <input id="message-input" placeholder="Store this in the remote D1 database...">
      <button id="submit-btn" style="background: #28a745; width:fit-content;">Submit to Worker</button>
    </div>
    <br>
    <button id="logout-btn" style="background:#666; font-size:0.8rem; padding:0.4rem 0.8rem;">Logout</button>
  </div>

  <div class="panel">
    <h3>D1 Message Board</h3>
    <div id="message-list">Loading messages...</div>
  </div>

  <h3>System Log</h3>
  <pre id="console">Loading bundle...</pre>

  <script src="/public/bundle.js"></script>
</body>
</html>
