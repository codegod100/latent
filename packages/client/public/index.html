<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Latent | Distributed Chat</title>
  <style>
    :root {
      --base: #1e1e2e;
      --mantle: #181825;
      --crust: #11111b;
      --text: #cdd6f4;
      --subtext0: #a6adc8;
      --surface0: #313244;
      --surface1: #45475a;
      --surface2: #585b70;
      --blue: #89b4fa;
      --lavender: #b4befe;
      --sapphire: #74c7ec;
      --sky: #89dceb;
      --teal: #94e2d5;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --peach: #fab387;
      --maroon: #eba0ac;
      --red: #f38ba8;
      --mauve: #cba6f7;
      --pink: #f5c2e7;
      --flamingo: #f2cdcd;
      --rosewater: #f5e0dc;
    }

    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--base); color: var(--text); height: 100vh; height: 100dvh; overflow: hidden; }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--base); }
    ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--surface2); }
    * { scrollbar-width: thin; scrollbar-color: var(--surface1) var(--base); }

    #app-container { display: none; height: 100vh; height: 100dvh; width: 100vw; flex-direction: row; position: relative; overflow: hidden; }
    
    /* Server Sidebar */
    #server-sidebar { width: 72px; background: var(--crust); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; border-right: 1px solid var(--mantle); z-index: 100; transition: transform 0.3s ease; height: 100%; }
    .server-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--surface0); color: var(--text); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: all 0.2s; position: relative; flex-shrink: 0; }
    .server-icon:hover, .server-icon.active { border-radius: 16px; background: var(--blue); color: var(--crust); }
    .server-icon.active::before { content: ""; position: absolute; left: -12px; height: 40px; width: 4px; background: var(--text); border-radius: 0 4px 4px 0; }
    .server-icon.add-server { color: var(--green); }
    .server-icon.offline { opacity: 0.4; filter: grayscale(1); border: 1px dashed var(--red); }
    .server-icon.offline:hover { opacity: 0.8; filter: none; border-style: solid; }

    /* Channel Sidebar */
    #channel-sidebar { width: 240px; background: var(--mantle); display: flex; flex-direction: column; flex-shrink: 0; z-index: 95; transition: transform 0.3s ease; height: 100%; }
    #server-header { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--crust); font-weight: bold; flex-shrink: 0; }
    #channel-list { flex-grow: 1; overflow-y: auto; padding: 12px 8px; }
    
    .category-item { display: flex; align-items: center; padding: 12px 8px 4px 8px; font-size: 12px; color: var(--subtext0); font-weight: bold; text-transform: uppercase; }
    .category-arrow { font-size: 8px; margin-right: 4px; width: 12px; }
    
    .channel-item { display: flex; align-items: center; padding: 8px 8px; border-radius: 4px; cursor: pointer; color: var(--subtext0); margin-bottom: 2px; }
    .channel-item:hover, .channel-item.active { background: var(--surface1); color: white; }
    .channel-hash { color: var(--surface2); margin-right: 6px; font-size: 1.2rem; }
    .add-icon, .delete-icon { margin-left: auto; cursor: pointer; font-size: 14px; padding: 0 4px; opacity: 0.6; }
    .add-icon:hover, .delete-icon:hover { opacity: 1; color: white; }

    /* Main Chat Area */
    #chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--base); position: relative; width: 100%; min-width: 0; height: 100%; }
    #chat-header { height: 48px; padding: 0 12px; display: flex; align-items: center; border-bottom: 1px solid var(--mantle); font-weight: bold; gap: 8px; flex-shrink: 0; }
    #message-list { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
    #input-area { padding: 0 16px 24px 16px; flex-shrink: 0; }
    #message-input { width: 100%; padding: 12px; background: var(--surface0); border: none; border-radius: 8px; color: var(--text); font-size: 16px; box-sizing: border-box; }
    #message-input:focus { outline: 1px solid var(--lavender); }

    .msg-item { display: flex; flex-direction: column; gap: 2px; }
    .msg-header { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .msg-author { color: var(--pink); font-weight: 600; }
    .msg-date { color: var(--subtext0); font-size: 0.7rem; }
    .msg-content { color: var(--text); line-height: 1.375; word-break: break-word; }
    .edit-link { color: var(--blue); font-size: 10px; cursor: pointer; margin-left: 8px; opacity: 0.6; }
    .edit-link:hover { opacity: 1; text-decoration: underline; }
    
    /* Inline Editing Styles */
    .edit-input { width: 100%; padding: 8px; background: var(--surface0); border: 1px solid var(--blue); border-radius: 4px; color: var(--text); margin-top: 4px; box-sizing: border-box; }
    .edit-actions { display: flex; gap: 8px; margin-top: 4px; font-size: 12px; }
    .edit-save { color: var(--green); background: none; border: none; cursor: pointer; padding: 0; font-weight: bold; }
    .edit-cancel { color: var(--red); background: none; border: none; cursor: pointer; padding: 0; }

    /* Loading States */
    .loading-overlay { opacity: 0.5; pointer-events: none; transition: opacity 0.2s; }
    .btn-loading { cursor: wait !important; opacity: 0.7; }
    .inline-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; margin-right: 6px; vertical-align: middle; }
    .big-spinner { border: 4px solid var(--surface0); border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--subtext0); }

    /* Mobile UI */
    #mobile-menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 0; }
    #mobile-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

    /* Modals / Menus */
    #admin-menu, #client-settings-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
    .modal-card { background: var(--mantle); width: 100%; max-width: 440px; border-radius: 8px; padding: 24px; border: 1px solid var(--surface0); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .admin-input { width: 100%; padding: 12px; background: var(--base); border: 1px solid var(--surface0); border-radius: 4px; color: var(--text); box-sizing: border-box; font-size: 16px; }
    .admin-save-btn { width: 100%; padding: 12px; background: var(--blue); color: var(--crust); border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 12px; }
    .admin-save-btn:hover { filter: brightness(1.1); }

    #login-panel, #loading-panel { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--base); z-index: 1000; }
    .login-card { background: var(--mantle); padding: 32px; border-radius: 8px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--surface0); }
    
    #user-info { margin-top: auto; padding: 12px; background: var(--crust); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #user-handle { font-size: 0.8rem; font-weight: bold; color: var(--lavender); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      #mobile-menu-btn { display: block; }
      #server-sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); z-index: 110; }
      #channel-sidebar { position: absolute; left: 72px; top: 0; bottom: 0; transform: translateX(-150%); width: calc(100% - 100px); max-width: 280px; z-index: 105; }
      
      #app-container.menu-open #server-sidebar { transform: translateX(0); }
      #app-container.menu-open #channel-sidebar { transform: translateX(0); }
      #app-container.menu-open #mobile-overlay { display: block; }
      
      .msg-item { gap: 4px; }
      #input-area { padding: 0 8px 12px 8px; }
    }
  </style>
</head>
<body>
  <div id="loading-panel">
    <div class="loading-container">
      <div class="big-spinner"></div>
      <div style="color: var(--mauve); font-weight: bold; margin-top: 8px;">Latent</div>
      <div id="load-msg" style="color: var(--subtext0); font-size: 12px;">Syncing identity...</div>
    </div>
  </div>

  <div id="login-panel" style="display:none">
    <div class="login-card">
      <h2 style="color: var(--mauve); margin-top: 0;">Latent</h2>
      <p style="color: var(--subtext0); font-size: 14px;">A zero-trust distributed chat platform.</p>
      <input id="handle" class="admin-input" style="margin: 20px 0;" value="nandi.latha.org" placeholder="your-handle.bsky.social">
      <button onclick="startLogin()" class="admin-save-btn" style="background: var(--mauve); margin-top: 0;">Log In</button>
    </div>
  </div>

  <div id="app-container">
    <div id="mobile-overlay" onclick="toggleMenu(false)"></div>
    
    <div id="server-sidebar"></div>
    
    <div id="channel-sidebar">
      <div id="server-header">
        <span id="current-server-name" style="color: var(--lavender);">...</span>
        <button id="admin-tools" onclick="toggleAdminMenu()" style="display:none; background:none; border:none; color:var(--subtext0); cursor:pointer; font-size: 18px;">⚙</button>
      </div>
      <div id="channel-list"></div>
      <div id="user-info">
        <div id="user-handle">...</div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:12px; font-weight:bold; margin-left: auto;">Logout</button>
      </div>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <button id="mobile-menu-btn" onclick="toggleMenu(true)">☰</button>
        <span class="channel-hash">#</span>
        <span id="current-channel-name" style="color: var(--text); flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">...</span>
      </div>

      <div id="message-list"></div>
      <div id="input-area">
        <input id="message-input" placeholder="Message" autocomplete="off">
      </div>

      <!-- Admin Menu -->
      <div id="admin-menu" style="display:none">
        <div class="modal-card">
          <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; color: var(--blue);">Server Settings</h2>
            <div style="cursor:pointer; font-size: 24px;" onclick="toggleAdminMenu()">×</div>
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display:block; font-size: 12px; color: var(--subtext0); text-transform: uppercase; margin-bottom: 8px; font-weight: bold;">Server Name</label>
            <input id="new-server-name" class="admin-input">
          </div>
          <button id="admin-save-btn" onclick="saveServerConfig()" class="admin-save-btn">Save Changes</button>
          <hr style="border:0; border-top:1px solid var(--surface1); margin: 20px 0;">
          <button onclick="addCategory()" class="admin-save-btn" style="background:var(--surface1); color: var(--text);">+ Add Category</button>
          <button onclick="promptAddChannel()" class="admin-save-btn" style="background:var(--surface1); color: var(--text);">+ Add Channel</button>
        </div>
      </div>

      <!-- Client Settings -->
      <div id="client-settings-modal" style="display:none">
        <div class="modal-card">
          <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; color: var(--green);">Server Connections</h2>
            <div style="cursor:pointer; font-size: 24px;" onclick="toggleClientSettings()">×</div>
          </div>
          <p style="color:var(--subtext0); font-size:14px;">Enter backend worker URLs (one per line).</p>
          <textarea id="server-urls-input" class="admin-input" style="height:120px; font-family:monospace; resize:none;"></textarea>
          <button id="client-save-btn" onclick="saveClientSettings()" class="admin-save-btn" style="background:var(--green); color: var(--crust);">Apply & Restart</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/bundle.js"></script>
</body>
</html>
